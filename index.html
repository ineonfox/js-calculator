<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <script src="./script.js"></script>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <div class="calc-body">
        <div class="calc-top">
            <span>CAS10 HL-4A</span>
            <div class="calc-screen">
                <span class="screen-numbers unclear prevent-select">8888888888</span>
                <span class="screen-numbers">7888</span>
            </div>
        </div>
        <div class="calc-buttons">
            <div class="btn-row">
                <button class="clear red">C</button>
                <button class="backspace red">⬅</button>
                <button class="sign">±</button>
                <button class="procent">%</button>
            </div>
            <div class="btn-row">
                <button class="number">7</button>
                <button class="number">8</button>
                <button class="number">9</button>
                <button class="divide">÷</button>
            </div>
            <div class="btn-row">
                <button class="number">4</button>
                <button class="number">5</button>
                <button class="number">6</button>
                <button class="multiply">×</button>
            </div>
            <div class="btn-row">
                <button class="number">1</button>
                <button class="number">2</button>
                <button class="number">3</button>
                <button class="subtract">–</button>
            </div>
            <div class="btn-row">
                <button class="number">0</button>
                <button class="dot">•</button>
                <button class="equal">=</button>
                <button class="add">+</button>
            </div>
        </div>
    </div>
</body>
</html>
